name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Determine version bump
        id: bump
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          COMMITS=$(git log "$RANGE" --pretty=format:"%s")
          if [ -z "$COMMITS" ]; then
            echo "bump=" >> "$GITHUB_OUTPUT"
            echo "No new commits since $LAST_TAG"
            exit 0
          fi

          # Check conventional commit types (most breaking first)
          BUMP=""
          if echo "$COMMITS" | grep -qE "^feat(\(.*\))?!:|BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.*\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE "^fix(\(.*\))?:"; then
            BUMP="patch"
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Detected bump: ${BUMP:-none}"

      - name: Bump, tag, release, and publish
        if: steps.bump.outputs.bump != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUMP="${{ steps.bump.outputs.bump }}"

          # Calculate new version
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping $CURRENT -> $NEW_VERSION ($BUMP)"

          # Update package.json in-place
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${MAJOR}.${MINOR}.${PATCH}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Generate release notes
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          RANGE="${LAST_TAG:+$LAST_TAG..}HEAD"

          NOTES=""
          FEATS=$(git log "$RANGE" --pretty=format:"* %s (%h)" --grep="^feat" --extended-regexp || true)
          FIXES=$(git log "$RANGE" --pretty=format:"* %s (%h)" --grep="^fix" --extended-regexp || true)
          [ -n "$FEATS" ] && NOTES="${NOTES}### Features\n\n${FEATS}\n\n"
          [ -n "$FIXES" ] && NOTES="${NOTES}### Bug Fixes\n\n${FIXES}\n\n"

          # Create tag on current commit and push
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION"
          git push origin "$NEW_VERSION"

          # Create GitHub release
          printf '%b' "$NOTES" | gh release create "$NEW_VERSION" \
            --title "$NEW_VERSION" \
            --notes-file -

          # Publish to npm (package.json is modified in working dir)
          npm publish
